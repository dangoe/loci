[workspace]
members = [
    "crates/ai-memory-core",
    "crates/ai-memory-embedding-ollama",
    "crates/ai-memory-qdrant",
    "crates/ai-memory-context-enhancer",
    "crates/ai-memory-cli",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
uuid = { version = "1", features = ["v4"] }
