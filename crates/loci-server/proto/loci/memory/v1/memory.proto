syntax = "proto3";

package loci.memory.v1;

import "google/protobuf/timestamp.proto";

enum MemoryKind {
  MEMORY_KIND_UNSPECIFIED = 0;
  MEMORY_KIND_FACT = 1;
  MEMORY_KIND_EXTRACTED_MEMORY = 2;
}

enum MemoryExtractionDiscardReason {
  MEMORY_EXTRACTION_DISCARD_REASON_UNSPECIFIED = 0;
  MEMORY_EXTRACTION_DISCARD_REASON_LOW_SCORE = 1;
  MEMORY_EXTRACTION_DISCARD_REASON_CONTRADICTS_A_FACT = 2;
}

message MemoryEntry {
  string id = 1;
  string content = 2;
  map<string, string> metadata = 3;
  MemoryKind kind = 4;
  uint32 seen_count = 5;
  google.protobuf.Timestamp first_seen = 7;
  google.protobuf.Timestamp last_seen = 8;
  google.protobuf.Timestamp expires_at = 9;
  google.protobuf.Timestamp created_at = 10;
  double score = 11;
}

message MemoryExtractionDiscardedEntry {
  string content = 1;
  MemoryExtractionDiscardReason reason = 2;
}

message MemoryServiceAddEntryRequest {
  string content = 1;
  map<string, string> metadata = 2;
  MemoryKind kind = 3;
}

message MemoryServiceAddEntryResponse {
  MemoryEntry entry = 1;
}

message MemoryServiceGetEntryRequest {
  string id = 1;
}

message MemoryServiceGetEntryResponse {
  MemoryEntry entry = 1;
}

message MemoryServiceQueryRequest {
  string topic = 1;
  uint32 max_results = 2;
  double min_score = 3;
  map<string, string> filters = 4;
}

message MemoryServiceQueryResponse {
  repeated MemoryEntry entries = 1;
}

message MemoryServicePromoteRequest {
  string id = 1;
}

message MemoryServicePromoteResponse {
  MemoryEntry entry = 1;
}

message MemoryServiceDeleteEntryRequest {
  string id = 1;
}

message MemoryServiceDeleteEntryResponse {
  bool deleted = 1;
}

message MemoryServicePruneExpiredRequest {}

message MemoryServicePruneExpiredResponse {
  bool pruned = 1;
}

message MemoryServiceExtractRequest {
  string text = 1;
  map<string, string> metadata = 2;
  optional uint32 max_entries = 3;
  optional double min_confidence = 4;
  optional string guidelines = 5;
}

message MemoryServiceExtractResponse {
  repeated MemoryEntry inserted = 1;
  repeated MemoryEntry merged = 2;
  repeated MemoryEntry promoted = 3;
  repeated MemoryExtractionDiscardedEntry discarded = 4;
}

service MemoryService {
  rpc AddEntry(MemoryServiceAddEntryRequest) returns (MemoryServiceAddEntryResponse);
  rpc GetEntry(MemoryServiceGetEntryRequest) returns (MemoryServiceGetEntryResponse);
  rpc Query(MemoryServiceQueryRequest) returns (MemoryServiceQueryResponse);
  rpc Promote(MemoryServicePromoteRequest) returns (MemoryServicePromoteResponse);
  rpc DeleteEntry(MemoryServiceDeleteEntryRequest) returns (MemoryServiceDeleteEntryResponse);
  rpc PruneExpired(MemoryServicePruneExpiredRequest) returns (MemoryServicePruneExpiredResponse);
  rpc Extract(MemoryServiceExtractRequest) returns (MemoryServiceExtractResponse);
}
