syntax = "proto3";

package loci.memory.v1;

import "google/protobuf/timestamp.proto";

enum MemoryTier {
  MEMORY_TIER_UNSPECIFIED = 0;
  MEMORY_TIER_EPHEMERAL = 1;
  MEMORY_TIER_CANDIDATE = 2;
  MEMORY_TIER_STABLE = 3;
  MEMORY_TIER_CORE = 4;
}

message MemoryEntry {
  string id = 1;
  string content = 2;
  map<string, string> metadata = 3;
  MemoryTier tier = 4;
  uint32 seen_count = 5;
  repeated string sources = 6;
  google.protobuf.Timestamp first_seen = 7;
  google.protobuf.Timestamp last_seen = 8;
  google.protobuf.Timestamp expires_at = 9;
  google.protobuf.Timestamp created_at = 10;
  double score = 11;
}

message MemoryServiceAddEntryRequest {
  string content = 1;
  map<string, string> metadata = 2;
  MemoryTier tier = 3;
}

message MemoryServiceAddEntryResponse {
  MemoryEntry entry = 1;
}

message MemoryServiceGetEntryRequest {
  string id = 1;
}

message MemoryServiceGetEntryResponse {
  MemoryEntry entry = 1;
}

message MemoryServiceQueryRequest {
  string topic = 1;
  uint32 max_results = 2;
  double min_score = 3;
  map<string, string> filters = 4;
}

message MemoryServiceQueryResponse {
  repeated MemoryEntry entries = 1;
}

message MemoryServiceUpdateEntryRequest {
  string id = 1;
  string content = 2;
  map<string, string> metadata = 3;
  MemoryTier tier = 4;
}

message MemoryServiceUpdateEntryResponse {
  MemoryEntry entry = 1;
}

message MemoryServiceSetEntryTierRequest {
  string id = 1;
  MemoryTier tier = 2;
}

message MemoryServiceSetEntryTierResponse {
  MemoryEntry entry = 1;
}

message MemoryServiceDeleteEntryRequest {
  string id = 1;
}

message MemoryServiceDeleteEntryResponse {
  bool deleted = 1;
}

message MemoryServicePruneExpiredRequest {}

message MemoryServicePruneExpiredResponse {
  bool pruned = 1;
}

service MemoryService {
  rpc AddEntry(MemoryServiceAddEntryRequest) returns (MemoryServiceAddEntryResponse);
  rpc GetEntry(MemoryServiceGetEntryRequest) returns (MemoryServiceGetEntryResponse);
  rpc Query(MemoryServiceQueryRequest) returns (MemoryServiceQueryResponse);
  rpc UpdateEntry(MemoryServiceUpdateEntryRequest) returns (MemoryServiceUpdateEntryResponse);
  rpc SetEntryTier(MemoryServiceSetEntryTierRequest) returns (MemoryServiceSetEntryTierResponse);
  rpc DeleteEntry(MemoryServiceDeleteEntryRequest) returns (MemoryServiceDeleteEntryResponse);
  rpc PruneExpired(MemoryServicePruneExpiredRequest) returns (MemoryServicePruneExpiredResponse);
}
